<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class  = "calculator">
    <div class="main-box">
     <input class="inp" type ='text' placeholder="Enter number">
      <br>
      <div class="inside">
    <button class = "box num">7</button>
    <button class = "box num">8</button>
    <button class = "box num">9</button>
    <button class = "box operator clear">C</button>
    <button class = "box num">4</button>
    <button class = "box num">5</button>
    <button class = "box num">6</button>
    <button class = "box operator">*</button>
    <button class = "box num">1</button>
    <button class = "box num">2</button>
    <button class = "box num">3</button>
    <button class = "box operator">/</button>
    <button class = "box num">0</button>
    <button class = "box operator">+</button>
    <button class = "box operator">-</button>
    <button class = "box equal-to operator">=</button>
      </div>
    </div>
    
  </div>
    
  
<script src="index.js"></script>
</body>
</html>
